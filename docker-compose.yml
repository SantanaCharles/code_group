services:
  db:
    image: postgres:16-alpine
    container_name: portfolio-db
    environment:
      POSTGRES_DB: portfolio
      POSTGRES_USER: portfolio
      POSTGRES_PASSWORD: portfolio
    ports:
      - "5432:5432"
    volumes:
      - portfolio-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portfolio"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: portfolio-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://db:5432/portfolio
      DB_USERNAME: portfolio
      DB_PASSWORD: portfolio
      MEMBROS_API_URL: http://localhost:8080/api/external/membros
    ports:
      - "8080:8080"

volumes:
  portfolio-data:
